services:

  # ──────────────────────────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gamesadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamespassword}
      POSTGRES_DB: ${POSTGRES_DB:-gamesplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gamesadmin} -d ${POSTGRES_DB:-gamesplatform}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-gamesadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-gamespassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-games}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────
  # Platform Services
  # ──────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gamesadmin}:${POSTGRES_PASSWORD:-gamespassword}@postgres:5432/${POSTGRES_DB:-gamesplatform}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  leaderboard-service:
    build:
      context: ./services/leaderboard-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-gamesadmin}:${POSTGRES_PASSWORD:-gamespassword}@postgres:5432/${POSTGRES_DB:-gamesplatform}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────
  # Game Services
  # ──────────────────────────────────────────────────────────────────

  tic-tac-toe-service:
    build:
      context: ./services/tic-tac-toe-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3003
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-gamesadmin}:${MONGO_INITDB_ROOT_PASSWORD:-gamespassword}@mongo:27017/${MONGO_DB:-games}?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      LEADERBOARD_SERVICE_URL: http://leaderboard-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      leaderboard-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  guess-number-service:
    build:
      context: ./services/guess-number-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3004
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-gamesadmin}:${MONGO_INITDB_ROOT_PASSWORD:-gamespassword}@mongo:27017/${MONGO_DB:-games}?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      LEADERBOARD_SERVICE_URL: http://leaderboard-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      leaderboard-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  hangman-service:
    build:
      context: ./services/hangman-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3005
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-gamesadmin}:${MONGO_INITDB_ROOT_PASSWORD:-gamespassword}@mongo:27017/${MONGO_DB:-games}?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      LEADERBOARD_SERVICE_URL: http://leaderboard-service:3002
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      leaderboard-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:3005/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────
  # Frontend + Gateway
  # ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:80"
    depends_on:
      auth-service:
        condition: service_healthy
      leaderboard-service:
        condition: service_healthy
      tic-tac-toe-service:
        condition: service_healthy
      guess-number-service:
        condition: service_healthy
      hangman-service:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
