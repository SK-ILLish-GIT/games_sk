server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    # ── Auth Service ───────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass         http://auth_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Leaderboard Service ────────────────────────────────────────
    location /api/leaderboard/ {
        proxy_pass         http://leaderboard_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Tic-Tac-Toe Service ────────────────────────────────────────
    location /api/tic-tac-toe/ {
        proxy_pass         http://tictactoe_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Guess-Number Service ───────────────────────────────────────
    location /api/guess-number/ {
        proxy_pass         http://guessnumber_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Hangman Service ────────────────────────────────────────────
    location /api/hangman/ {
        proxy_pass         http://hangman_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket passthrough (for future real-time support) ───────
    location /ws/ {
        proxy_pass          http://tictactoe_service/;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
    }

    # ── React SPA (frontend service) ──────────────────────────────
    location / {
        proxy_pass         http://frontend_service/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SPA fallback: 404s from frontend serve index.html
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    # Named locations: proxy_pass must not include a URI path (no trailing slash on upstream).
    location @spa_fallback {
        rewrite ^ /index.html break;
        proxy_pass http://frontend_service;
    }
}
